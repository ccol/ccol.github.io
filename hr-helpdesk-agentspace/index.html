<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agentspace × Agentforce × Data 360 — Demo</title>
<style>
  :root {
    --bg: #f8f9fa;
    --panel: #ffffff;
    --panel-2: #f1f3f4;
    --line: #dadce0;
    --line-soft: #e8eaed;
    --text: #202124;
    --text-dim: #5f6368;
    --text-muted: #80868b;
    --blue: #3b82f6;
    --purple: #a855f7;
    --pink: #ec4899;
    --teal: #14b8a6;
    --sf-blue: #00a1e0;
    --d360: #7c3aed;
    --workday: #f38b00;
    --google-blue: #4285F4;
    --google-green: #34A853;
    --google-yellow: #FBBC05;
    --google-red: #EA4335;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Google Sans", "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: default;
    user-select: none;
    overflow: hidden;
    position: relative;
  }
  .glow {
    position: absolute;
    top: 50%; left: 50%;
    width: 1000px; height: 600px;
    background: rgba(26,115,232,0.05);
    transform: translate(-50%, -50%);
    filter: blur(120px);
    border-radius: 9999px;
    pointer-events: none;
    z-index: 0;
  }
  .hint {
    position: absolute;
    top: 40px;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 24px;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 9999px;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--text-dim);
    animation: pulse 2.4s ease-in-out infinite;
    box-shadow: 0 1px 3px rgba(60,64,67,0.10);
  }
  @keyframes pulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
  .hint svg { stroke: currentColor; }

  .stage {
    width: 100%;
    max-width: 1280px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(60,64,67,0.18);
    position: relative;
    z-index: 1;
  }
  .frame {
    height: 720px;
    background: var(--panel);
    color: var(--text);
    display: flex;
    overflow: hidden;
  }

  /* progress bar */
  .progress {
    margin-top: 48px;
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 1280px;
    padding: 0 32px;
    z-index: 1;
  }
  .progress .seg {
    height: 2px;
    flex: 1;
    border-radius: 9999px;
    background: #e8eaed;
    transition: all 700ms ease;
  }
  .progress .seg.active {
    background: #1a73e8;
    box-shadow: 0 0 8px rgba(26,115,232,0.35);
  }

  /* top-right chip */
  .chip-tr {
    position: absolute;
    top: 32px; right: 32px;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line);
    border-radius: 9999px;
    z-index: 2;
  }
  .chip-tr .div { width: 1px; height: 16px; background: rgba(255,255,255,0.20); margin: 0 4px; }
  .avatar {
    width: 24px; height: 24px;
    border-radius: 9999px;
    background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    overflow: hidden;
  }

  /* ===== Agentspace home (steps 0–1) ===== */
  .as-home {
    width: 100%;
    height: 100%;
    background: #f8f9fa;
    color: #1f1f1f;
    font-family: "Google Sans", "Roboto", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    display: grid;
    grid-template-columns: 248px 1fr;
    grid-template-rows: 56px 1fr;
    overflow: hidden;
  }
  .as-topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    background: #ffffff;
    border-bottom: 1px solid #dadce0;
  }
  .as-topbar .brand {
    display: flex; align-items: center; gap: 10px;
    width: 228px;
  }
  .as-topbar .brand .word {
    font-size: 20px; font-weight: 500;
    color: #1f1f1f;
    letter-spacing: -0.01em;
  }
  .as-topbar .search {
    flex: 1;
    max-width: 720px;
    display: flex; align-items: center; gap: 12px;
    background: #f1f3f4;
    border: 1px solid transparent;
    border-radius: 999px;
    padding: 8px 18px;
    color: #5f6368;
    font-size: 14px;
    transition: background 150ms, border-color 150ms;
  }
  .as-topbar .search:hover { background: #e8eaed; }
  .as-topbar .search .ph { color: #5f6368; flex: 1; }
  .as-topbar .acct {
    margin-left: auto;
    display: flex; align-items: center; gap: 10px;
  }
  .as-topbar .acct .name {
    font-size: 13px; color: #3c4043; font-weight: 500;
  }
  .as-topbar .acct .ava {
    width: 32px; height: 32px;
    border-radius: 999px;
    background: linear-gradient(135deg, #1a73e8 0%, #4285f4 100%);
    color: #fff;
    font-size: 12px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }

  /* Left rail */
  .as-rail {
    background: #ffffff;
    border-right: 1px solid #dadce0;
    padding: 16px 8px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 4px;
  }
  .as-rail .group-label {
    font-size: 11px; font-weight: 500;
    color: #5f6368;
    letter-spacing: 0.04em;
    padding: 12px 16px 6px;
    text-transform: none;
  }
  .as-rail .item {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 16px;
    border-radius: 0 999px 999px 0;
    margin-right: 8px;
    color: #3c4043;
    font-size: 14px;
    font-weight: 500;
    cursor: default;
  }
  .as-rail .item:hover { background: #f1f3f4; }
  .as-rail .item.active {
    background: #e8f0fe;
    color: #1967d2;
  }
  .as-rail .item .ic {
    width: 18px; height: 18px;
    flex-shrink: 0;
    color: currentColor;
  }
  .as-rail .item .dot {
    width: 8px; height: 8px;
    border-radius: 999px;
    flex-shrink: 0;
  }
  .as-rail .pinned-list {
    display: flex; flex-direction: column;
    gap: 2px;
  }

  /* Center workspace */
  .as-main {
    overflow-y: auto;
    padding: 40px 48px;
  }
  .as-hero {
    max-width: 760px;
    margin: 0 auto 36px;
    text-align: center;
  }
  .as-hero h1 {
    font-size: 40px;
    font-weight: 400;
    color: #202124;
    letter-spacing: -0.01em;
    margin-bottom: 28px;
  }
  .as-hero h1 .grad {
    background: linear-gradient(90deg, #4285F4 0%, #9b72cb 35%, #d96570 70%, #f9ab00 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 500;
  }
  .as-search-big {
    display: flex; align-items: center; gap: 12px;
    background: #ffffff;
    border: 1px solid #dadce0;
    border-radius: 28px;
    padding: 14px 22px;
    box-shadow: 0 1px 6px rgba(32,33,36,0.06);
    transition: box-shadow 150ms, border-color 150ms;
  }
  .as-search-big:hover {
    box-shadow: 0 1px 10px rgba(32,33,36,0.12);
    border-color: #c4c7c5;
  }
  .as-search-big .ph {
    flex: 1; color: #5f6368; font-size: 16px;
    text-align: left;
  }
  .as-search-big .icbtn {
    width: 32px; height: 32px;
    border-radius: 999px;
    color: #5f6368;
    display: flex; align-items: center; justify-content: center;
  }
  .as-quickchips {
    display: flex; gap: 10px; flex-wrap: wrap;
    justify-content: center;
    margin-top: 18px;
  }
  .as-quickchips .chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    background: #ffffff;
    border: 1px solid #dadce0;
    border-radius: 999px;
    font-size: 13px;
    color: #3c4043;
    font-weight: 500;
  }
  .as-quickchips .chip:hover { background: #f8f9fa; }

  /* Agent gallery */
  .as-section-title {
    max-width: 1080px; margin: 28px auto 14px;
    font-size: 14px; font-weight: 500;
    color: #3c4043;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .as-section-title .more {
    font-size: 13px; color: #1a73e8; font-weight: 500;
  }
  .as-gallery {
    max-width: 1080px; margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  .agent-tile {
    background: #ffffff;
    border: 1px solid #dadce0;
    border-radius: 14px;
    padding: 16px;
    cursor: pointer;
    transition: box-shadow 200ms, transform 200ms, border-color 200ms;
    display: flex; flex-direction: column; gap: 10px;
    min-height: 140px;
    position: relative;
  }
  .agent-tile:hover {
    box-shadow: 0 1px 8px rgba(32,33,36,0.10);
    border-color: #c4c7c5;
  }
  .agent-tile.featured {
    border-color: #1a73e8;
    box-shadow: 0 0 0 1px #1a73e8 inset, 0 4px 16px rgba(26,115,232,0.12);
    animation: pulseRing 2.4s ease-in-out infinite;
  }
  @keyframes pulseRing {
    0%,100% { box-shadow: 0 0 0 1px #1a73e8 inset, 0 4px 16px rgba(26,115,232,0.10); }
    50%     { box-shadow: 0 0 0 1px #1a73e8 inset, 0 6px 22px rgba(26,115,232,0.30); }
  }
  .agent-tile .head {
    display: flex; align-items: center; gap: 12px;
  }
  .agent-tile .head .icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-size: 18px;
    flex-shrink: 0;
  }
  .agent-tile .head .icon.hr      { background: #1a73e8; }
  .agent-tile .head .icon.it      { background: #5f6368; }
  .agent-tile .head .icon.travel  { background: #f9ab00; color: #202124; }
  .agent-tile .head .icon.sales   { background: #0f9d58; }
  .agent-tile .head .icon.proc    { background: #d93025; }
  .agent-tile .head .icon.notebook{ background: #9334e6; }
  .agent-tile .head .name {
    font-size: 15px; font-weight: 500; color: #202124;
    line-height: 1.2;
  }
  .agent-tile .head .owner {
    font-size: 12px; color: #5f6368; margin-top: 2px;
  }
  .agent-tile .desc {
    font-size: 13px; color: #3c4043; line-height: 1.45;
    flex: 1;
  }
  .agent-tile .systems {
    display: flex; gap: 5px; flex-wrap: wrap;
  }
  .agent-tile .sys-chip {
    font-size: 10px; font-weight: 500;
    padding: 3px 8px;
    border-radius: 999px;
    background: #f1f3f4;
    color: #3c4043;
    border: 1px solid #e8eaed;
  }
  .agent-tile .pinned-flag {
    position: absolute; top: 12px; right: 12px;
    font-size: 10px; font-weight: 500;
    color: #1a73e8;
    background: #e8f0fe;
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: 0.02em;
  }

  /* Step 1: agent conversation surface */
  .as-agent-surface {
    max-width: 880px;
    margin: 0 auto;
    background: #ffffff;
    border: 1px solid #dadce0;
    border-radius: 16px;
    overflow: hidden;
    animation: slideUpFade 350ms ease;
    box-shadow: 0 1px 8px rgba(32,33,36,0.08);
  }
  @keyframes slideUpFade {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }
  .as-agent-head {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 22px;
    border-bottom: 1px solid #e8eaed;
  }
  .as-agent-head .icon {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: #1a73e8;
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .as-agent-head .meta { flex: 1; min-width: 0; }
  .as-agent-head .meta .name {
    font-size: 17px; font-weight: 500; color: #202124;
  }
  .as-agent-head .meta .owner {
    font-size: 12px; color: #5f6368; margin-top: 2px;
  }
  .as-agent-head .systems {
    display: flex; gap: 5px; flex-wrap: wrap;
    margin-left: auto;
  }
  .as-agent-head .systems .sys-chip {
    font-size: 10px; font-weight: 500;
    padding: 3px 8px;
    border-radius: 999px;
    background: #f1f3f4;
    color: #3c4043;
    border: 1px solid #e8eaed;
  }
  .as-agent-body {
    min-height: 240px;
    padding: 32px 24px;
    display: flex; align-items: center; justify-content: center;
    color: #5f6368;
    font-size: 13px;
  }
  .as-agent-body .empty {
    text-align: center;
    color: #80868b;
  }
  .as-agent-body .empty .lbl {
    font-size: 12px;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .as-agent-foot {
    padding: 14px 18px;
    border-top: 1px solid #e8eaed;
    background: #f8f9fa;
  }
  .as-prompt {
    display: flex; align-items: center; gap: 12px;
    background: #ffffff;
    border: 1px solid #dadce0;
    border-radius: 24px;
    padding: 10px 18px;
    transition: border-color 150ms, box-shadow 150ms;
  }
  .as-prompt.armed {
    border-color: #1a73e8;
    box-shadow: 0 0 0 3px rgba(26,115,232,0.12);
  }
  .as-prompt .plus { color: #5f6368; }
  .as-prompt .input {
    flex: 1; font-size: 14px; color: #202124;
    line-height: 1.4; min-height: 22px;
    text-align: left;
  }
  .as-prompt .ph { color: #80868b; }
  .as-prompt .caret {
    display: inline-block;
    width: 2px; height: 18px;
    background: #1a73e8;
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  .as-prompt .send {
    color: #5f6368;
    transition: color 150ms;
  }
  .as-prompt .send.armed { color: #1a73e8; }

  /* ===== STEP 0–1: home screen ===== */
  .home {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px;
    position: relative;
  }
  .greeting { margin-bottom: 48px; }
  .greeting h1 {
    font-size: 48px;
    font-weight: 600;
    color: rgba(255,255,255,0.90);
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }
  .greeting h2 {
    font-size: 56px;
    font-weight: 600;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, #a78bfa 0%, #f0abfc 50%, #fb7185 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    padding-bottom: 8px;
  }

  .promptbox {
    width: 100%;
    max-width: 720px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 40px;
    padding: 20px;
    box-shadow: 0 0 80px rgba(0,0,0,0.5);
    transition: all 200ms ease;
  }
  .promptbox-row {
    display: flex; align-items: center; gap: 16px;
    padding: 8px 16px;
    text-align: left;
  }
  .promptbox .plus { color: var(--text-dim); }
  .promptbox .input {
    flex: 1;
    font-size: 19px;
    color: var(--text);
    line-height: 1.4;
    min-height: 28px;
  }
  .promptbox .ph { color: var(--text-muted); }
  .promptbox .caret {
    display: inline-block;
    width: 6px; height: 24px;
    background: var(--purple);
    margin-left: 4px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .promptbox .meta {
    display: flex; align-items: center; gap: 16px;
    color: var(--text-dim);
  }
  .promptbox .meta .lbl {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .promptbox .meta .send {
    color: var(--text-dim);
    transition: color 200ms;
  }
  .promptbox .meta .send.armed { color: var(--purple); }

  /* Gemini Enterprise brand mark */
  .wa-mark {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, #00a1e0 0%, #7c3aed 60%, #ec4899 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: #fff;
    letter-spacing: -0.04em;
  }
  .brand-row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    border-radius: 9999px;
    margin-bottom: 28px;
  }
  .brand-row .name {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.20em; text-transform: uppercase;
    color: rgba(255,255,255,0.78);
  }
  .brand-row .tag {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.45);
    border-left: 1px solid rgba(255,255,255,0.15);
    padding-left: 10px;
  }

  /* ===== STEPS 2+: chat layout (Agentspace light) ===== */
  .chat { display: flex; width: 100%; height: 100%; font-family: "Google Sans", "Roboto", -apple-system, system-ui, sans-serif; }
  .chat-left {
    width: 100%;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--line);
    background: #ffffff;
    transition: width 700ms ease;
    min-height: 0;
    height: 100%;
  }
  .chat-left.shrunk { width: 58%; }
  .chat-right {
    flex: 1 1 0;
    min-width: 0;
    min-height: 0;
    height: 100%;
    background: #f8f9fa;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 22px;
    border-bottom: 1px solid var(--line);
    background: #ffffff;
  }
  .chat-header .left { display: flex; align-items: center; gap: 12px; }
  .chat-header .left .agent-icon {
    width: 32px; height: 32px;
    border-radius: 10px;
    background: #1a73e8;
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .chat-header .left .label {
    font-size: 14px; font-weight: 500;
    color: #202124;
    letter-spacing: 0;
    text-transform: none;
  }
  .chat-header .left .sub {
    font-size: 11px; color: #5f6368;
    margin-top: 1px;
  }
  .chat-header .right {
    display: flex; align-items: center; gap: 10px;
    color: var(--text-dim);
  }
  .chat-header .right .ava {
    width: 28px; height: 28px;
    border-radius: 999px;
    background: linear-gradient(135deg, #1a73e8 0%, #4285f4 100%);
    color: #fff;
    font-size: 11px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }
  .chat-scroll {
    flex: 1 1 0;
    min-height: 0;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: #ffffff;
  }
  .bubble-user {
    align-self: flex-end;
    max-width: 85%;
    background: #e8f0fe;
    border: 1px solid #d2e3fc;
    border-radius: 18px;
    border-top-right-radius: 4px;
    padding: 12px 16px;
    color: #1f1f1f;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.5;
  }
  .bubble-ai {
    align-self: flex-start;
    max-width: 92%;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 18px;
    border-top-left-radius: 4px;
    padding: 14px 16px;
    color: #1f1f1f;
    font-size: 14px;
    line-height: 1.55;
    box-shadow: 0 1px 2px rgba(60,64,67,0.06);
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .bubble-ai .body { flex: 1; }
  .bubble-ai .body p + p { margin-top: 8px; }
  .bubble-ai .agent-mark {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: #1a73e8;
    color: #fff;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .bubble-ai .citations {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #e8eaed;
  }
  .bubble-ai .citation {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 999px;

  function scrollChatToEnd() {
    const scroll = document.getElementById("chatScroll");
    if (scroll) scroll.scrollTop = scroll.scrollHeight;
  }

  function appendEntry(entry) {
    entry.id = entry.id || `e${++entrySeq}`;
    chatLog.push(entry);
    mountEntry(entry);
    scrollChatToEnd();
    return entry;
  }

  function mountEntry(e) {
    const scroll = document.getElementById("chatScroll");
    if (!scroll) return;
    const wrap = document.createElement("div");
    wrap.innerHTML = entryHtml(e);
    const child = wrap.firstElementChild;
    if (child) {
      child.id = e.id;
      scroll.appendChild(child);
    }
  }

  function entryHtml(e) {
    if (e.kind === "user") return `<div class="bubble-user">${escapeHtml(e.text)}</div>`;
    if (e.kind === "ai") {
      const cites = e.citations ? `<div class="citations">${e.citations.map(c => `<span class="citation"><span class="cdot" style="background:${c.color}"></span>${escapeHtml(c.label)}</span>`).join("")}</div>` : "";
      return `<div class="bubble-ai">
        <span class="agent-mark"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.2"/><path d="M5 21a7 7 0 0 1 14 0"/></svg></span>
        <div class="body">${e.html}${cites}</div>
      </div>`;
    }
    if (e.kind === "tools") {
      const inner = e.items.map(t => toolHtml(t)).join("");
      return `<div class="tools" data-id="${e.id}">${inner}</div>`;
    }
    if (e.kind === "tile") return e.html;
    return "<div></div>";
  }

  function toolHtml(t) {
    const map = {
      gcal: { svg: iconGCal(14), cls: "gcal" },
      gpeople: { svg: iconGPeople(14), cls: "gpeople" },
      grooms: { svg: iconGRooms(14), cls: "grooms" },
      salesforce: { svg: iconSalesforce(14), cls: "sf" },
      gkb: { svg: iconGKB(14), cls: "gkb" },
      data360: { svg: iconD360(14), cls: "d360" }
    };
    const sysIcon = map[t.system] || { svg: "", cls: "" };
    const statusLabel = t.status === "done" ? "Done" : "Running";
    const heroCls = t.hero ? ` ${t.hero}` : "";
    return `
      <div class="tool ${t.status}${heroCls}" data-tool-id="${t.id}">
        <div class="badge ${sysIcon.cls}">${sysIcon.svg}</div>
        <div class="body">
          <div class="name">${escapeHtml(t.name)}</div>
          <div class="text">${t.text}</div>
        </div>
        <div class="status">
          <span class="dot"></span>
          <span class="lbl">${statusLabel}</span>
        </div>
      </div>`;
  }

  function updateToolStatus(toolsEntry, toolId, newStatus) {
    const item = toolsEntry.items.find(t => t.id === toolId);
    if (item) item.status = newStatus;
    const el = document.querySelector(`[data-tool-id="${toolId}"]`);
    if (el) {
      el.classList.remove("running", "done");
      el.classList.add(newStatus);
      const lbl = el.querySelector(".status .lbl");
      if (lbl) lbl.textContent = newStatus === "done" ? "Done" : "Running";
    }
  }

  function appendTool(toolsEntry, tool) {
    tool.id = tool.id || `t${++entrySeq}`;
    toolsEntry.items.push(tool);
    const container = document.querySelector(`.tools[data-id="${toolsEntry.id}"]`);
    if (container) {
      const wrap = document.createElement("div");
      wrap.innerHTML = toolHtml(tool);
      container.appendChild(wrap.firstElementChild);
      scrollChatToEnd();
    }
  }

  function runStep9() {
    animating = true;
    const tools = appendEntry({ kind: "tools", items: [] });
    a2aTools = tools;

    const t1 = {
      id: `t${++entrySeq}`,
      system: "salesforce",
      name: "A2A · Agentforce HR Helpdesk Agent",
      text: "Delegating to Agentforce…",
      status: "running"
    };
    appendTool(tools, t1);

    setTimeout(() => {
      updateToolStatus(tools, t1.id, "done");
      const t2 = {
        id: `t${++entrySeq}`,
        system: "salesforce",
        name: "A2A · Agentforce HR Helpdesk Agent",
        text: "Awaiting A2A Result…",
        status: "running"
      };
      appendTool(tools, t2);
      tools._waitingId = t2.id;
      animating = false;
    }, 1500);
  }

  // ---------- Step 10: Agentforce orchestrated Resolution Plan ----------
  function runStep10() {
    animating = true;

    if (a2aTools && a2aTools._waitingId) {
      updateToolStatus(a2aTools, a2aTools._waitingId, "done");
    }

    const chatLeft = document.getElementById("chatLeft");
    const chat = document.querySelector(".chat");
    if (chatLeft) chatLeft.classList.add("shrunk");

    const right = document.createElement("div");
    right.className = "chat-right";
    right.id = "rpRight";
    right.innerHTML = `
      <div class="rp-panel">
        <div class="rp-head">
          <div class="l">
            <div style="width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:#e1f5fe;color:#0277bd;">${iconSalesforce(18)}</div>
            <div>
              <div class="title">Resolution Plan</div>
              <div class="sub">Agentforce HR Helpdesk Agent · A2A result</div>
            </div>
          </div>
          <span class="rp-pill">Draft (A2A Synced)</span>
        </div>

        <div class="rp-body">

          <div class="rp-block escalated">
            <div class="head">
              <div class="check">✓</div>
              <div class="title">Case #00045231 — Printer PRN-L7-04</div>
              <span class="badge esc">Escalated</span>
            </div>
            <div class="meta-line">
              Asset <b>PRN-L7-04</b> · Priority <b>High</b> · routed past tier-1 to the <b>L7 Facilities Manager</b>.
            </div>
            <div class="rationale">
              <b>Escalation rationale attached:</b> 12 cases on Level 7 in 90 days · KB-PRN-203 applied 9× / reopened 8× · standard remediation isn't holding.
            </div>
            <div class="systems">
              <span class="sys-chip">Service Cloud</span>
              <span class="sys-chip">Google KB</span>
              <span class="sys-chip">Data 360</span>
            </div>
          </div>

          <div class="rp-block">
            <div class="head">
              <div class="check">✓</div>
              <div class="title">PTO submitted — Friday 22 May</div>
            </div>
            <div class="meta-line">
              Workday request <b>#WD-88412</b> · auto-routed to <b>Daniel R</b> for approval · leave policy AU-Office, no blackout, balance 14.5d.
            </div>
            <div class="systems">
              <span class="sys-chip">Workday</span>
              <span class="sys-chip">SuccessFactors</span>
            </div>
          </div>

        </div>

        <div class="rp-foot">
          <span><span class="arch">Orchestrated by Agentforce</span> · Reasoned over Google KB + SF Cases + Data 360</span>
          <span>2 systems writes · 0 conflicts</span>
        </div>
      </div>`;

    if (chat && !document.getElementById("rpRight")) {
      chat.appendChild(right);
    }

    appendEntry({
      kind: "ai",
      html: `<p>Agentforce is back. The case is in with the L7 Facilities Manager (escalation rationale attached) and your Friday PTO is sitting with Daniel R for approval. Review on the right and confirm to wrap this up.</p>`
    });

    setTimeout(() => { animating = false; }, 400);
  }

  // ---------- Step 11: user confirms send → animated system check-ins ----------
  let step11LoaderDone = false;
  function runStep11() {
    animating = true;
    step11LoaderDone = false;

    appendEntry({ kind: "user", text: "Looks good — confirm." });

    const right = document.getElementById("rpRight");
    if (!right) { animating = false; step11LoaderDone = true; return; }

    right.innerHTML = `
      <div class="rp-panel">
        <div class="rp-head">
          <div class="l">
            <div style="width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:#f3e8fd;color:#7c3aed;">${iconSalesforce(18)}</div>
            <div>
              <div class="title">Committing Plan</div>
              <div class="sub">Writing across each system and verifying receipt</div>
            </div>
          </div>
          <span class="rp-pill">Working…</span>
        </div>

        <div class="rp-body">
          <div class="sys-loader" id="sysLoader">
            <div class="lh">System Check-ins</div>
            <div class="row" data-i="0"><span class="spin"></span><span class="name">Salesforce Service Cloud</span><span class="id">Case #00045231</span></div>
            <div class="row" data-i="1"><span class="spin"></span><span class="name">Workday</span><span class="id">PTO #WD-88412</span></div>
            <div class="row" data-i="2"><span class="spin"></span><span class="name">Google Calendar</span><span class="id">Invite v2 sent</span></div>
            <div class="row" data-i="3"><span class="spin"></span><span class="name">Google Chat</span><span class="id">EA notified</span></div>
          </div>
        </div>

        <div class="rp-foot">
          <span><span class="arch">Agentforce + Gemini in Agentspace</span> · 4 systems · 2-phase commit</span>
          <span id="sysFootHint">Verifying…</span>
        </div>
      </div>`;

    const rows = right.querySelectorAll(".sys-loader .row");
    [0,1,2,3].forEach(i => setTimeout(() => rows[i] && rows[i].classList.add("in"), i * 100));
    [600, 950, 1300, 1650].forEach((t, i) => setTimeout(() => rows[i] && rows[i].classList.add("done"), t));

    setTimeout(() => {
      const hint = document.getElementById("sysFootHint");
      if (hint) hint.innerHTML = `<span style="color:#0f9d58;font-weight:500;letter-spacing:0;">All systems confirmed · click to finish →</span>`;
      step11LoaderDone = true;
      animating = false;
    }, 2000);
  }

  // ---------- Step 12: done summary ----------
  function runStep12() {
    animating = true;

    const right = document.getElementById("rpRight");
    if (right) {
      right.innerHTML = `
        <div class="rp-panel">
          <div class="rp-head">
            <div class="l">
              <div style="width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:#0f9d58;color:#ffffff;font-weight:700;">✓</div>
              <div>
                <div class="title" style="color:#137333;">All Done</div>
                <div class="sub">4 of 4 actions complete</div>
              </div>
            </div>
            <span class="rp-pill" style="background:#e6f4ea;color:#137333;border-color:#b7e1c2;">Resolved</span>
          </div>

          <div class="rp-body">
            <div class="done-card">
              <div class="head">
                <div class="check">✓</div>
                <div>
                  <div class="title">Summary</div>
                  <div class="sub">Priya is set for the 10:30 readout</div>
                </div>
              </div>
              <div class="done-row"><span class="tick">✓</span><span><b>Case escalated</b> to L7 Facilities Manager · #00045231</span><span class="meta">Service Cloud</span></div>
              <div class="done-row"><span class="tick">✓</span><span><b>Meeting moved</b> to Boardroom L6-A · 6 attendees notified</span><span class="meta">Google Calendar</span></div>
              <div class="done-row"><span class="tick">✓</span><span><b>PTO submitted</b> for Friday 22 May · awaiting Daniel R approval</span><span class="meta">Workday</span></div>
              <div class="done-row"><span class="tick">✓</span><span><b>EA notified</b> with the room change</span><span class="meta">Google Chat</span></div>
            </div>

            <div style="padding:14px 16px;border:1px solid #e1d2fa;border-radius:12px;background:#faf5ff;font-size:12.5px;color:#3c4043;line-height:1.6;">
              <div style="font-size:11px;font-weight:500;letter-spacing:0;color:#5e35b1;margin-bottom:6px;">What just happened</div>
              One conversation replaced <b>three legacy forms</b> (facilities case, room rebooking, PTO request).
              The escalation decision was reasoned over the <b>Google KB</b>, <b>Service Cloud case history</b>, and Priya's <b>Data 360 panoramic</b> — context the legacy widget never had.
            </div>
          </div>

          <div class="rp-foot">
            <span><span class="arch">Agentspace + Agentforce</span> · Reasoned over Google KB + SF Cases + Data 360</span>
            <span style="color:#0f9d58;font-weight:500;letter-spacing:0;">Click to restart</span>
          </div>
        </div>`;
    }

    appendEntry({
      kind: "ai",
      html: `<p>Done. Case escalated, room moved, PTO filed, EA looped in. Anything else?</p>`
    });

    setTimeout(() => { animating = false; }, 350);
  }

  function render() {
    if (stepIndex <= 1) {
      chatMounted = false;
      renderHome();
    } else {
      mountChat();
    }
    renderProgress();
  }

  // ---------- Click-to-advance ----------
  document.addEventListener("click", () => {
    if (typingTimer || animating) return;

    if (stepIndex === 0) {
      // First click: transition home → agent surface (open the HR Helpdesk Agent),
      // then type the prompt into the agent's input.
      stepIndex = 1;
      renderProgress();
      renderAgentSurface();
      const inputEl = document.querySelector(".as-prompt .input");
      const sendEl = document.querySelector(".as-prompt .send");
      const wrapEl = document.querySelector(".as-prompt");
      let i = 0;
      // small delay so the surface transition is perceptible before typing starts
      setTimeout(() => {
        typingTimer = setInterval(() => {
          i++;
          typed = PROMPT_TEXT.slice(0, i);
          if (inputEl) {
            inputEl.innerHTML = `<span>${escapeHtml(typed)}</span><span class="caret"></span>`;
          }
          if (i === PROMPT_TEXT.length) {
            clearInterval(typingTimer);
            typingTimer = null;
            if (sendEl) sendEl.classList.add("armed");
            if (wrapEl) wrapEl.classList.add("armed");
          }
        }, 18);
      }, 350);
      return;
    }

    if (stepIndex === 1) {
      if (typingTimer) return;
      if (typed.length < PROMPT_TEXT.length) return;
      stepIndex = 2;
      mountChat();
      renderProgress();
      runStep2();
      return;
    }

    if (stepIndex === 2) {
      stepIndex = 3;
      renderProgress();
      runStep3();
      return;
    }

    if (stepIndex === 3) {
      stepIndex = 4;
      renderProgress();
      runStep4();
      return;
    }

    if (stepIndex === 4) {
      stepIndex = 5;
      renderProgress();
      runStep5();
      return;
    }

    if (stepIndex === 5) {
      stepIndex = 6;
      renderProgress();
      runStep6();
      return;
    }

    if (stepIndex === 6) {
      stepIndex = 7;
      renderProgress();
      runStep7();
      return;
    }

    if (stepIndex === 7) {
      stepIndex = 8;
      renderProgress();
      runStep8();
      return;
    }

    if (stepIndex === 8) {
      stepIndex = 9;
      renderProgress();
      runStep9();
      return;
    }

    if (stepIndex === 9) {
      stepIndex = 10;
      renderProgress();
      runStep10();
      return;
    }

    if (stepIndex === 10) {
      stepIndex = 11;
      renderProgress();
      runStep11();
      return;
    }

    if (stepIndex === 11) {
      if (!step11LoaderDone) return; // click-gate while loader animates
      stepIndex = 12;
      renderProgress();
      runStep12();
      return;
    }

    // step 12 → loop back
    if (stepIndex >= 12) {
      stepIndex = 0;
      typed = "";
      chatLog = [];
      chatMounted = false;
      a2aTools = null;
      step11LoaderDone = false;
      const right = document.getElementById("rpRight");
      if (right) right.remove();
      const left = document.getElementById("chatLeft");
      if (left) left.classList.remove("shrunk");
      render();
    }
  });

  render();
</script>

</body>
</html>
