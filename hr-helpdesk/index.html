<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gemini Enterprise × Data 360 — Demo</title>
<style>
  :root {
    --bg: #050505;
    --panel: #0e0e0e;
    --panel-2: #1e1e1e;
    --line: rgba(255,255,255,0.10);
    --line-soft: rgba(255,255,255,0.05);
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.40);
    --text-muted: rgba(255,255,255,0.20);
    --blue: #3b82f6;
    --purple: #a855f7;
    --pink: #ec4899;
    --teal: #14b8a6;
    --sf-blue: #00a1e0;
    --d360: #7c3aed;
    --workday: #f38b00;
    --google-blue: #4285F4;
    --google-green: #34A853;
    --google-yellow: #FBBC05;
    --google-red: #EA4335;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: default;
    user-select: none;
    overflow: hidden;
    position: relative;
  }
  .glow {
    position: absolute;
    top: 50%; left: 50%;
    width: 1000px; height: 600px;
    background: rgba(124,58,237,0.06);
    transform: translate(-50%, -50%);
    filter: blur(120px);
    border-radius: 9999px;
    pointer-events: none;
    z-index: 0;
  }
  .hint {
    position: absolute;
    top: 40px;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 24px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line);
    border-radius: 9999px;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--text-dim);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
  .hint svg { stroke: currentColor; }

  .stage {
    width: 100%;
    max-width: 1280px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 48px;
    overflow: hidden;
    box-shadow: 0 0 120px rgba(0,0,0,1);
    position: relative;
    z-index: 1;
  }
  .frame {
    height: 700px;
    background: var(--panel);
    color: var(--text);
    display: flex;
    overflow: hidden;
  }

  /* progress bar */
  .progress {
    margin-top: 48px;
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 1280px;
    padding: 0 32px;
    z-index: 1;
  }
  .progress .seg {
    height: 2px;
    flex: 1;
    border-radius: 9999px;
    background: rgba(255,255,255,0.05);
    transition: all 700ms ease;
  }
  .progress .seg.active {
    background: var(--purple);
    box-shadow: 0 0 15px var(--purple);
  }

  /* top-right chip */
  .chip-tr {
    position: absolute;
    top: 32px; right: 32px;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line);
    border-radius: 9999px;
    z-index: 2;
  }
  .chip-tr .div { width: 1px; height: 16px; background: rgba(255,255,255,0.20); margin: 0 4px; }
  .avatar {
    width: 24px; height: 24px;
    border-radius: 9999px;
    background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    overflow: hidden;
  }

  /* ===== STEP 0–1: home screen ===== */
  .home {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px;
    position: relative;
  }
  .greeting { margin-bottom: 48px; }
  .greeting h1 {
    font-size: 48px;
    font-weight: 600;
    color: rgba(255,255,255,0.90);
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }
  .greeting h2 {
    font-size: 56px;
    font-weight: 600;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, #a78bfa 0%, #f0abfc 50%, #fb7185 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    padding-bottom: 8px;
  }

  .promptbox {
    width: 100%;
    max-width: 720px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 40px;
    padding: 20px;
    box-shadow: 0 0 80px rgba(0,0,0,0.5);
    transition: all 200ms ease;
  }
  .promptbox-row {
    display: flex; align-items: center; gap: 16px;
    padding: 8px 16px;
    text-align: left;
  }
  .promptbox .plus { color: var(--text-dim); }
  .promptbox .input {
    flex: 1;
    font-size: 19px;
    color: var(--text);
    line-height: 1.4;
    min-height: 28px;
  }
  .promptbox .ph { color: var(--text-muted); }
  .promptbox .caret {
    display: inline-block;
    width: 6px; height: 24px;
    background: var(--purple);
    margin-left: 4px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .promptbox .meta {
    display: flex; align-items: center; gap: 16px;
    color: var(--text-dim);
  }
  .promptbox .meta .lbl {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .promptbox .meta .send {
    color: var(--text-dim);
    transition: color 200ms;
  }
  .promptbox .meta .send.armed { color: var(--purple); }

  /* Gemini Enterprise brand mark */
  .wa-mark {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, #00a1e0 0%, #7c3aed 60%, #ec4899 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: #fff;
    letter-spacing: -0.04em;
  }
  .brand-row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    border-radius: 9999px;
    margin-bottom: 28px;
  }
  .brand-row .name {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.20em; text-transform: uppercase;
    color: rgba(255,255,255,0.78);
  }
  .brand-row .tag {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.45);
    border-left: 1px solid rgba(255,255,255,0.15);
    padding-left: 10px;
  }

  /* ===== STEPS 2+: chat layout ===== */
  .chat { display: flex; width: 100%; height: 100%; }
  .chat-left {
    width: 100%;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--line);
    background: #0a0a0a;
    transition: width 700ms ease;
    min-height: 0;
    height: 100%;
  }
  .chat-left.shrunk { width: 55%; }
  .chat-right {
    flex: 1 1 0;
    min-width: 0;
    min-height: 0;
    height: 100%;
    background: #0e0e0e;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--line);
  }
  .chat-header .left { display: flex; align-items: center; gap: 10px; }
  .chat-header .left .label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.78);
  }
  .chat-header .right {
    display: flex; align-items: center; gap: 8px;
    color: var(--text-dim);
  }
  .chat-scroll {
    flex: 1 1 0;
    min-height: 0;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .bubble-user {
    align-self: flex-end;
    max-width: 85%;
    background: #242424;
    border: 1px solid var(--line-soft);
    border-radius: 20px;
    border-top-right-radius: 0;
    padding: 14px 18px;
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    font-weight: 600;
    line-height: 1.5;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  .bubble-ai {
    align-self: flex-start;
    max-width: 90%;
    background: #242424;
    border: 1px solid var(--line-soft);
    border-radius: 24px;
    border-top-left-radius: 0;
    padding: 18px 20px;
    color: rgba(255,255,255,0.92);
    font-size: 14px;
    line-height: 1.55;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .bubble-ai .body { flex: 1; }
  .bubble-ai .body p + p { margin-top: 8px; }

  .tools {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-self: flex-start;
    max-width: 90%;
    width: 100%;
  }
  .tool {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line-soft);
    border-radius: 14px;
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    animation: slideIn 350ms ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }
  .tool .badge {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .tool .badge.gcal { background: rgba(66,133,244,0.15); color: #93c5fd; }
  .tool .badge.gpeople { background: rgba(52,168,83,0.15); color: #86efac; }
  .tool .badge.grooms { background: rgba(251,188,5,0.15); color: #fde68a; }
  .tool .badge.sf { background: rgba(0,161,224,0.15); color: #4ec5ee; }
  .tool .badge.gkb { background: rgba(234,67,53,0.15); color: #fca5a5; }
  .tool .badge.d360 { background: rgba(124,58,237,0.18); color: #b794f6; }
  .tool .body { flex: 1; min-width: 0; }
  .tool .body .name {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 2px;
  }
  .tool .body .text { color: rgba(255,255,255,0.92); }
  .tool .status {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    flex-shrink: 0;
  }
  .tool.done .status .dot { background: #34d399; box-shadow: 0 0 8px #34d399; }
  .tool.running .status .dot { background: #fbbf24; box-shadow: 0 0 8px #fbbf24; animation: pulse 1.4s ease-in-out infinite; }
  .tool .status .dot { width: 6px; height: 6px; border-radius: 9999px; }

  /* hero ring for the Agentforce KB-fusion call */
  .tool.fusion {
    border-color: rgba(0,161,224,0.45);
    background: linear-gradient(180deg, rgba(0,161,224,0.10) 0%, rgba(0,161,224,0.04) 100%);
    box-shadow: 0 0 24px rgba(0,161,224,0.18);
  }
  /* hero ring for the Data 360 panoramic call */
  .tool.d360-hero {
    border-color: rgba(124,58,237,0.45);
    background: linear-gradient(180deg, rgba(124,58,237,0.10) 0%, rgba(124,58,237,0.04) 100%);
    box-shadow: 0 0 24px rgba(124,58,237,0.18);
  }

  /* chat footer prompt stub */
  .chat-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--line);
  }
  .chat-footer .promptbox {
    max-width: none;
    border-radius: 24px;
    padding: 12px;
  }
  .chat-footer .promptbox .input { font-size: 14px; }

  /* ===== KB + Case Fusion two-pane tile (step 3) ===== */
  .fusion-tile {
    align-self: stretch;
    width: 100%;
    background: linear-gradient(180deg, #141414 0%, #0e0e0e 100%);
    border: 1px solid rgba(0,161,224,0.30);
    border-radius: 18px;
    overflow: hidden;
    animation: slideIn 400ms ease;
    box-shadow: 0 12px 36px rgba(0,0,0,0.4);
  }
  .fusion-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line-soft);
    background: rgba(0,161,224,0.05);
  }
  .fusion-head .l { display: flex; align-items: center; gap: 10px; }
  .fusion-head .name {
    font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.92);
  }
  .fusion-head .sub {
    font-size: 10px; color: rgba(255,255,255,0.50);
    margin-top: 2px;
  }
  .fusion-pill {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 9999px;
    background: rgba(0,161,224,0.14);
    color: #4ec5ee;
    border: 1px solid rgba(0,161,224,0.35);
  }
  .fusion-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .fusion-col {
    padding: 14px 16px;
  }
  .fusion-col + .fusion-col {
    border-left: 1px solid var(--line-soft);
  }
  .fusion-col .col-head {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }
  .fusion-col .col-head .src {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }
  .fusion-col .col-head .src-logo {
    width: 18px; height: 18px;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
  }
  .fusion-col .col-head .src-logo.kb {
    background: rgba(234,67,53,0.15); color: #fca5a5;
  }
  .fusion-col .col-head .src-logo.sf {
    background: rgba(0,161,224,0.15); color: #4ec5ee;
  }
  .kb-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 12px;
  }
  .kb-card .id {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 10px;
    color: rgba(252,165,165,0.85);
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .kb-card .title {
    font-size: 13px; font-weight: 700; color: #fff;
    margin-bottom: 8px;
  }
  .kb-card .steps {
    font-size: 12px; color: rgba(255,255,255,0.75);
    line-height: 1.6;
    list-style: none;
    padding: 0;
  }
  .kb-card .steps li {
    padding: 3px 0;
    display: flex; gap: 8px;
  }
  .kb-card .steps li .step-n {
    color: rgba(252,165,165,0.85);
    font-weight: 700;
    flex-shrink: 0;
  }
  .kb-card .meta-line {
    margin-top: 10px;
    font-size: 10px;
    color: rgba(255,255,255,0.40);
    letter-spacing: 0.04em;
  }
  .case-list {
    display: flex; flex-direction: column;
    gap: 8px;
  }
  .case-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 8px 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    font-size: 12px;
  }
  .case-row .cnum {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 10px; color: #4ec5ee;
  }
  .case-row .cwhat { color: rgba(255,255,255,0.85); font-size: 12px; }
  .case-row .cstatus {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 9999px;
    background: rgba(251,191,36,0.15);
    color: #fde68a;
    border: 1px solid rgba(251,191,36,0.30);
  }
  .case-row .cstatus.reopened {
    background: rgba(239,68,68,0.15);
    color: #fca5a5;
    border-color: rgba(239,68,68,0.35);
  }
  .pattern-callout {
    margin-top: 12px;
    padding: 10px 12px;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.30);
    border-radius: 8px;
    font-size: 12px;
    color: #fecaca;
    line-height: 1.5;
  }
  .pattern-callout b { color: #fff; }
  .fusion-foot {
    padding: 12px 16px;
    border-top: 1px solid var(--line-soft);
    background: rgba(0,161,224,0.04);
    font-size: 11px;
    color: rgba(255,255,255,0.65);
    line-height: 1.55;
  }
  .fusion-foot .pain {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: #fbbf24;
    margin-bottom: 4px;
  }

  /* ===== Step 4 — D360 filter chip ===== */
  .filter-chip {
    align-self: stretch;
    width: 100%;
    background: rgba(124,58,237,0.06);
    border: 1px dashed rgba(124,58,237,0.40);
    border-radius: 12px;
    padding: 12px 14px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 11px;
    color: #c4b5fd;
    line-height: 1.7;
    animation: slideIn 350ms ease;
  }
  .filter-chip .label {
    display: inline-block;
    font-family: -apple-system, sans-serif;
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: #b794f6;
    margin-bottom: 8px;
  }
  .filter-chip .k { color: rgba(255,255,255,0.45); }
  .filter-chip .v { color: #e9d5ff; }

  /* ===== Step 5 — D360 Employee Panoramic ===== */
  .pano-wrap {
    align-self: stretch;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: slideIn 400ms ease;
  }
  .pano-banner {
    display: flex; align-items: center; gap: 10px;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: #c4b5fd;
  }
  .pano-banner .pulse {
    width: 8px; height: 8px;
    border-radius: 9999px;
    background: #a855f7;
    box-shadow: 0 0 0 0 rgba(168,85,247,0.7);
    animation: livepulse 1.6s ease-out infinite;
  }
  @keyframes livepulse {
    0%   { box-shadow: 0 0 0 0 rgba(168,85,247,0.7); }
    100% { box-shadow: 0 0 0 12px rgba(168,85,247,0); }
  }
  .pano-banner-inline {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: #c4b5fd;
    background: rgba(124,58,237,0.10);
    border-bottom: 1px solid rgba(124,58,237,0.20);
  }
  .pano-banner-inline .pulse {
    width: 8px; height: 8px;
    border-radius: 9999px;
    background: #a855f7;
    box-shadow: 0 0 0 0 rgba(168,85,247,0.7);
    animation: livepulse 1.6s ease-out infinite;
  }
  .pano-card {
    background: linear-gradient(180deg, #161324 0%, #0e0e1a 100%);
    border: 1px solid rgba(124,58,237,0.35);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 12px 36px rgba(124,58,237,0.10);
    position: relative;
  }
  .pano-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 90% -20%, rgba(124,58,237,0.18), transparent 60%);
    pointer-events: none;
  }
  .pano-head {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(124,58,237,0.20);
    position: relative;
  }
  .pano-head .ava {
    width: 40px; height: 40px;
    border-radius: 9999px;
    background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    flex-shrink: 0;
  }
  .pano-head .who .name { font-size: 14px; font-weight: 700; color: #fff; }
  .pano-head .who .role { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 2px; }
  .pano-head .live {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: #c4b5fd;
  }
  .pano-head .live .dot {
    width: 6px; height: 6px;
    border-radius: 9999px;
    background: #a855f7;
    box-shadow: 0 0 8px #a855f7;
    animation: livepulse 1.6s ease-out infinite;
  }
  .pano-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    position: relative;
  }
  .pano-facet {

  .pano-facet .field .k {

  }
  .pano-facet .field .v {
    font-size: 12.5px;
    color: rgba(255,255,255,0.92);

  }
  .pano-facet .field .v b { color: #fff; }
  .pano-facet .field .v.warn { color: #fcd34d; }
  .pano-facet .field .v.danger { color: #fca5a5; }
  .pano-facet .chain {
    display: flex; align-items: center; flex-wrap: wrap;

  .pano-facet .agg-bar {

  .pano-foot {

  /* ===== Step 6 — agent reasoning bubble + actions ===== */
  .reasoning {
    align-self: stretch;
    width: 100%;

  .reasoning .head .icon {

  /* actions list */
  .actions-tile {

  /* CTA buttons */

  .cta.primary {

  /* ===== Step 8 — Google Chat / Google Calendar tool icons (we already have them) ===== */
  .tool .badge.gchat { background: rgba(15,157,88,0.15); color: #86efac; }

  /* ===== Step 10 — Resolution Plan right-hand panel ===== */
  .rp-panel {
    width: 100%;
    flex: 1 1 0;
    min-height: 0;

</style>

<body>

<div class="glow"></div>

<div class="hint">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z"/>
  </svg>
  Click anywhere to advance
</div>

<div class="stage">
  <div class="frame" id="frame"></div>
</div>

<div class="progress" id="progress"></div>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="wa-grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00a1e0"/>
      <stop offset="0.5" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
</svg>

<script>
  // ---------- Icon helpers ----------
  const iconGoogleG = (size = 24) => `
    <svg viewBox="0 0 24 24" width="${size}" height="${size}" aria-hidden="true">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>`;

  const iconPlus = (size = 22) => `
    <svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M5 12h14"/><path d="M12 5v14"/>
    </svg>`;

  const iconSend = (size = 24) => `
    <svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"/>
      <path d="m21.854 2.147-10.94 10.939"/>
    </svg>`;

  // Google Calendar (simplified)
  const iconGCal = (size = 14) => `
    <svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="currentColor" aria-hidden="true">
      <rect x="3" y="4" width="18" height="17" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/>
      <path d="M3 8h18" stroke="currentColor" stroke-width="1.6" fill="none"/>
      <path d="M8 2v4M16 2v4" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <text x="12" y="17" text-anchor="middle" font-size="7" font-weight="800" fill="currentColor" font-family="-apple-system,sans-serif">31</text>
    </svg>`;

  // Google "people" icon for attendees
  const iconGPeople = (size = 14) => `
    <svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="9" cy="8" r="3"/>
      <path d="M3 20a6 6 0 0 1 12 0"/>
      <circle cx="17" cy="9" r="2.4"/>
      <path d="M15 20a5 5 0 0 1 7-4.6"/>
    </svg>`;

  // Google rooms icon (door / building)
  const iconGRooms = (size = 14) => `
    <svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="4" y="3" width="16" height="18" rx="1.5"/>
      <path d="M9 3v18M15 3v18"/>
      <circle cx="11.5" cy="12" r="0.8" fill="currentColor"/>
    </svg>`;

  // Salesforce cloud
  const iconSalesforce = (size = 14) => `
    <svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="currentColor" aria-hidden="true">
      <path d="M14 6.5a4.5 4.5 0 0 0-8.3-2.4A3.5 3.5 0 0 0 1 7.5a3.5 3.5 0 0 0 1.5 2.9A3 3 0 0 0 5 16h13.5A4.5 4.5 0 0 0 23 11.5a4.5 4.5 0 0 0-4.6-4.5A4.5 4.5 0 0 0 14 6.5z"/>
    </svg>`;

  // Google KB / Drive doc
  const iconGKB = (size = 14) => `
    <svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/>
      <path d="M14 3v5h5"/>
      <path d="M9 13h6M9 17h4"/>
    </svg>`;

  // Data 360 graph mark
  const iconD360 = (size = 14) => `
    <svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="9"/>
      <circle cx="6" cy="12" r="2.4" fill="currentColor"/>
      <circle cx="18" cy="12" r="2.4" fill="currentColor"/>
      <circle cx="12" cy="6" r="2.4" fill="currentColor"/>
      <circle cx="12" cy="18" r="2.4" fill="currentColor"/>
      <path d="M6 12h12M12 6v12"/>
    </svg>`;

  // ---------- State ----------
  const TOTAL_STEPS = 13;
  const PROMPT_TEXT = "My printer's jammed and I've got a board readout in 20 min — also can you check my PTO, want to take Friday off.";
  let stepIndex = 0;
  let typed = "";
  let typingTimer = null;
  let animating = false;
  let chatMounted = false;
  let entrySeq = 0;
  let chatLog = [];

  // ---------- Render ----------
  const frame = document.getElementById("frame");
  const progress = document.getElementById("progress");

  for (let i = 0; i < TOTAL_STEPS; i++) {
    const d = document.createElement("div");
    d.className = "seg";
    progress.appendChild(d);
  }
  function renderProgress() {
    [...progress.children].forEach((el, i) => {
      el.classList.toggle("active", i <= stepIndex);
    });
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function renderHome() {
    const showSendArmed = stepIndex === 1;
    frame.innerHTML = `
      <div class="home">
        <div class="chip-tr">
          ${iconGoogleG(22)}
          <div class="div"></div>
          <span style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.7);letter-spacing:0.02em;">Priya Singh</span>
          <div class="avatar">PS</div>
        </div>

        <div class="brand-row">
          <div class="wa-mark">W</div>
          <span class="name">Gemini Enterprise</span>
          <span class="tag">Powered by Agentforce · Woolworths Group</span>
        </div>

        <div class="greeting">
          <h1>Hi Priya</h1>
          <h2>What can I help with?</h2>
        </div>

        <div class="promptbox">
          <div class="promptbox-row">
            <span class="plus">${iconPlus(22)}</span>
            <div class="input">
              ${
                typed.length === 0
                  ? `<span class="ph">Ask Gemini Enterprise…</span>`
                  : `<span>${escapeHtml(typed)}</span>`
              }<span class="caret"></span>
            </div>
            <div class="meta">
              <span class="lbl">${showSendArmed ? "Thinking" : "Ready"}</span>
              <span class="send ${showSendArmed ? "armed" : ""}">${iconSend(24)}</span>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function mountChat() {
    if (chatMounted) return;
    frame.innerHTML = `
      <div class="chat">
        <div class="chat-left" id="chatLeft">
          <div class="chat-header">
            <div class="left">
              <div class="wa-mark" style="width:22px;height:22px;font-size:11px;border-radius:6px;">W</div>
              <span class="label">Gemini Enterprise</span>
            </div>
            <div class="right">
              ${iconGoogleG(18)}
              <div class="avatar">PS</div>
            </div>
          </div>
          <div class="chat-scroll" id="chatScroll"></div>
          <div class="chat-footer">
            <div class="promptbox">
              <div class="promptbox-row">
                <span class="plus">${iconPlus(18)}</span>
                <div class="input"><span class="ph">Ask Gemini Enterprise…</span></div>
                <div class="meta"><span class="send">${iconSend(20)}</span></div>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    chatMounted = true;
    chatLog.forEach(e => mountEntry(e));
    scrollChatToEnd();
  }

  function scrollChatToEnd() {
    const scroll = document.getElementById("chatScroll");
    if (scroll) scroll.scrollTop = scroll.scrollHeight;
  }

  function appendEntry(entry) {

  function mountEntry(e) {
    const scroll = document.getElementById("chatScroll");
    if (!scroll) return;
    const wrap = document.createElement("div");
    wrap.innerHTML = entryHtml(e);
    const child = wrap.firstElementChild;
    if (child) {
      child.id = e.id;
      scroll.appendChild(child);
    }
  }

  function entryHtml(e) {
    if (e.kind === "user") return `<div class="bubble-user">${escapeHtml(e.text)}</div>`;
    if (e.kind === "ai") {
      return `<div class="bubble-ai">
        <span style="margin-top:2px"><div class="wa-mark" style="width:22px;height:22px;font-size:11px;border-radius:6px;">W</div></span>
        <div class="body">${e.html}</div>
      </div>`;
    }
    if (e.kind === "tools") {
      const inner = e.items.map(t => toolHtml(t)).join("");
      return `<div class="tools" data-id="${e.id}">${inner}</div>`;
    }
    if (e.kind === "tile") return e.html;
    return "<div></div>";
  }

  function toolHtml(t) {
    const map = {
      gcal: { svg: iconGCal(14), cls: "gcal" },
      gpeople: { svg: iconGPeople(14), cls: "gpeople" },
      grooms: { svg: iconGRooms(14), cls: "grooms" },
      salesforce: { svg: iconSalesforce(14), cls: "sf" },
      gkb: { svg: iconGKB(14), cls: "gkb" },
      data360: { svg: iconD360(14), cls: "d360" }
    };
    const sysIcon = map[t.system] || { svg: "", cls: "" };
    const statusLabel = t.status === "done" ? "Done" : "Running";
    const heroCls = t.hero ? ` ${t.hero}` : "";
    return `
      <div class="tool ${t.status}${heroCls}" data-tool-id="${t.id}">
        <div class="badge ${sysIcon.cls}">${sysIcon.svg}</div>
        <div class="body">
          <div class="name">${escapeHtml(t.name)}</div>
          <div class="text">${t.text}</div>
        </div>
        <div class="status">
          <span class="dot"></span>
          <span class="lbl">${statusLabel}</span>
        </div>
      </div>`;
  }

  function updateToolStatus(toolsEntry, toolId, newStatus) {
    const item = toolsEntry.items.find(t => t.id === toolId);
    if (item) item.status = newStatus;
    const el = document.querySelector(`[data-tool-id="${toolId}"]`);
    if (el) {
      el.classList.remove("running", "done");
      el.classList.add(newStatus);
      const lbl = el.querySelector(".status .lbl");
      if (lbl) lbl.textContent = newStatus === "done" ? "Done" : "Running";
    }
  }

  function appendTool(toolsEntry, tool) {
    tool.id = tool.id || `t${++entrySeq}`;
