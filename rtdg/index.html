<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gemini Enterprise × Data360 RTUPG — Demo</title>
<style>
  :root {
    --bg: #050505;
    --panel: #0e0e0e;
    --panel-2: #1e1e1e;
    --line: rgba(255,255,255,0.10);
    --line-soft: rgba(255,255,255,0.05);
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.40);
    --text-muted: rgba(255,255,255,0.20);
    --blue: #3b82f6;
    --purple: #a855f7;
    --pink: #ec4899;
    --teal: #14b8a6;
    --sf-blue: #00a1e0;
    --sf-cloud: #0d9dda;
    --ms-purple: #5059c9;
    --d360: #7c3aed;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: default;
    user-select: none;
    overflow: hidden;
    position: relative;
  }
  /* big blurred glow behind the panel */
  .glow {
    position: absolute;
    top: 50%; left: 50%;
    width: 1000px; height: 600px;
    background: rgba(37,99,235,0.05);
    transform: translate(-50%, -50%);
    filter: blur(120px);
    border-radius: 9999px;
    pointer-events: none;
    z-index: 0;
  }
  .hint {
    position: absolute;
    top: 40px;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 24px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line);
    border-radius: 9999px;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--text-dim);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
  .hint svg { stroke: currentColor; }

  .stage {
    width: 100%;
    max-width: 1280px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 48px;
    overflow: hidden;
    box-shadow: 0 0 120px rgba(0,0,0,1);
    position: relative;
    z-index: 1;
  }
  .frame {
    height: 700px;
    background: var(--panel);
    color: var(--text);
    display: flex;
    overflow: hidden;
  }

  /* progress bar */
  .progress {
    margin-top: 48px;
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 1280px;
    padding: 0 32px;
    z-index: 1;
  }
  .progress .seg {
    height: 2px;
    flex: 1;
    border-radius: 9999px;
    background: rgba(255,255,255,0.05);
    transition: all 700ms ease;
  }
  .progress .seg.active {
    background: var(--blue);
    box-shadow: 0 0 15px var(--blue);
  }

  /* shared chrome — top-right google chip */
  .chip-tr {
    position: absolute;
    top: 32px; right: 32px;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line);
    border-radius: 9999px;
    z-index: 2;
  }
  .chip-tr .div { width: 1px; height: 16px; background: rgba(255,255,255,0.20); margin: 0 4px; }
  .avatar {
    width: 24px; height: 24px;
    border-radius: 9999px;
    background: var(--blue);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    overflow: hidden;
  }

  /* ======= STEP 0–1: Home / prompt screen ======= */
  .home {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px;
    position: relative;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .greeting { margin-bottom: 48px; }
  .greeting h1 {
    font-size: 48px;
    font-weight: 600;
    color: rgba(255,255,255,0.90);
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }
  .greeting h2 {
    font-size: 60px;
    font-weight: 600;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, #60a5fa 0%, #c084fc 50%, #f472b6 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    padding-bottom: 8px;
  }

  .promptbox {
    width: 100%;
    max-width: 672px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 40px;
    padding: 20px;
    box-shadow: 0 0 80px rgba(0,0,0,0.5);
    transition: all 200ms ease;
  }
  .promptbox-row {
    display: flex; align-items: center; gap: 16px;
    padding: 8px 16px;
    text-align: left;
  }
  .promptbox .plus { color: var(--text-dim); }
  .promptbox .input {
    flex: 1;
    font-size: 20px;
    color: var(--text);
    line-height: 1.4;
    min-height: 28px;
  }
  .promptbox .ph { color: var(--text-muted); }
  .promptbox .caret {
    display: inline-block;
    width: 6px; height: 28px;
    background: var(--blue);
    margin-left: 4px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .promptbox .meta {
    display: flex; align-items: center; gap: 16px;
    color: var(--text-dim);
  }
  .promptbox .meta .lbl {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .promptbox .meta .send {
    color: var(--text-dim);
    transition: color 200ms;
  }
  .promptbox .meta .send.armed { color: var(--blue); }

  /* ======= STEPS 2+: chat layout ======= */
  .chat {
    display: flex;
    width: 100%;
    height: 100%;
  }
  .chat-left {
    width: 100%;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--line);
    background: #0a0a0a;
    transition: width 700ms ease;
    min-height: 0;
    height: 100%;
  }
  .chat-left.shrunk { width: 55%; }
  .chat-right {
    flex: 1 1 0;
    min-width: 0;
    min-height: 0;
    height: 100%;
    background: #0e0e0e;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--line);
  }
  .chat-header .left {
    display: flex; align-items: center; gap: 10px;
  }
  .chat-header .left .label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
  }
  .chat-header .right {
    display: flex; align-items: center; gap: 8px;
    color: var(--text-dim);
  }
  .chat-header .right .avatar { background: var(--blue); }

  .chat-scroll {
    flex: 1 1 0;
    min-height: 0;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* user bubble (right-aligned, bold) */
  .bubble-user {
    align-self: flex-end;
    max-width: 85%;
    background: #242424;
    border: 1px solid var(--line-soft);
    border-radius: 20px;
    border-top-right-radius: 0;
    padding: 14px 18px;
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    font-weight: 700;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }

  /* gemini bubble (left, with logo) */
  .bubble-ai {
    align-self: flex-start;
    max-width: 90%;
    background: #242424;
    border: 1px solid var(--line-soft);
    border-radius: 24px;
    border-top-left-radius: 0;
    padding: 18px 20px;
    color: rgba(255,255,255,0.92);
    font-size: 14px;
    line-height: 1.55;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .bubble-ai .body { flex: 1; }
  .bubble-ai .body p + p { margin-top: 8px; }

  /* tool-call status list */
  .tools {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-self: flex-start;
    max-width: 90%;
    width: 100%;
  }
  .tool {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line-soft);
    border-radius: 14px;
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    animation: slideIn 350ms ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }
  .tool .badge {
    width: 26px; height: 26px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .tool .badge.slack { background: rgba(74,21,75,0.18); color: #e9b8ec; }
  .tool .badge.gmail { background: rgba(234,67,53,0.15); color: #f87171; }
  .tool .badge.sf { background: rgba(0,161,224,0.15); color: #4ec5ee; }
  .tool .badge.d360 { background: rgba(124,58,237,0.18); color: #b794f6; }
  .tool .body { flex: 1; }
  .tool .body .name {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 2px;
  }
  .tool .body .text { color: rgba(255,255,255,0.92); }
  .tool .status {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }
  .tool.done .status .dot { background: #34d399; box-shadow: 0 0 8px #34d399; }
  .tool.running .status .dot { background: #fbbf24; box-shadow: 0 0 8px #fbbf24; animation: pulse 1.4s ease-in-out infinite; }
  .tool .status .dot { width: 6px; height: 6px; border-radius: 9999px; }

  /* result tile — shared shell */
  .tile {
    align-self: flex-start;
    width: 100%;
    max-width: 90%;
    background: linear-gradient(180deg, #141414 0%, #0e0e0e 100%);
    border: 1px solid var(--line);
    border-radius: 18px;
    overflow: hidden;
    animation: slideIn 400ms ease;
    box-shadow: 0 12px 36px rgba(0,0,0,0.4);
  }
  .tile-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line-soft);
    background: rgba(255,255,255,0.02);
  }
  .tile-head .l { display: flex; align-items: center; gap: 10px; }
  .tile-head .l .name {
    font-size: 12px; font-weight: 700;
    color: rgba(255,255,255,0.85);
  }
  .tile-head .l .sub {
    font-size: 10px;
    color: rgba(255,255,255,0.45);
    margin-top: 2px;
  }
  .tile-head .badge-pill {
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 9999px;
    background: rgba(0,161,224,0.14);
    color: #4ec5ee;
    border: 1px solid rgba(0,161,224,0.3);
  }
  .tile-body { padding: 4px 0; }
  .tile-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 16px;
    align-items: center;
    padding: 12px 16px;
    border-top: 1px solid var(--line-soft);
    font-size: 13px;
  }
  .tile-row:first-child { border-top: none; }
  .tile-row .acct { color: rgba(255,255,255,0.92); font-weight: 600; }
  .tile-row .meta { color: rgba(255,255,255,0.45); font-size: 12px; }
  .tile-row .amt { color: #4ade80; font-weight: 700; font-size: 13px; }
  .tile-foot {
    padding: 10px 16px;
    border-top: 1px solid var(--line-soft);
    font-size: 10px;
    color: rgba(255,255,255,0.40);
    letter-spacing: 0.08em;
  }

  /* prompt-style footer at bottom of chat */
  .chat-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--line);
  }
  .chat-footer .promptbox {
    max-width: none;
    border-radius: 24px;
    padding: 12px;
  }
  .chat-footer .promptbox .input { font-size: 14px; }

  /* MCP filter chip — shown under the Data360 tool call */
  .filter-chip {
    align-self: flex-start;
    max-width: 90%;
    background: rgba(124,58,237,0.06);
    border: 1px dashed rgba(124,58,237,0.4);
    border-radius: 12px;
    padding: 10px 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 11px;
    color: #c4b5fd;
    line-height: 1.6;
    animation: slideIn 350ms ease;
  }
  .filter-chip .k { color: rgba(255,255,255,0.45); }
  .filter-chip .v { color: #e9d5ff; }
  .filter-chip .label {
    display: inline-block;
    font-family: -apple-system, sans-serif;
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: #b794f6;
    margin-bottom: 6px;
  }

  /* hero MCP highlight ring (for Data360 tool call) */
  .tool.hero {
    border-color: rgba(124,58,237,0.45);
    background: linear-gradient(180deg, rgba(124,58,237,0.10) 0%, rgba(124,58,237,0.04) 100%);
    box-shadow: 0 0 24px rgba(124,58,237,0.18);
  }

  /* RTUPG profile cards */
  .rtupg-wrap {
    align-self: stretch;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: slideIn 400ms ease;
  }
  .rtupg-banner {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #c4b5fd;
  }
  .rtupg-banner .pulse {
    width: 8px; height: 8px;
    border-radius: 9999px;
    background: #34d399;
    box-shadow: 0 0 0 0 rgba(52,211,153,0.7);
    animation: livepulse 1.6s ease-out infinite;
  }
  @keyframes livepulse {
    0%   { box-shadow: 0 0 0 0 rgba(52,211,153,0.7); }
    100% { box-shadow: 0 0 0 12px rgba(52,211,153,0); }
  }
  .rtupg-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .rtupg-card {
    background: linear-gradient(180deg, #161324 0%, #0e0e1a 100%);
    border: 1px solid rgba(124,58,237,0.35);
    border-radius: 18px;
    padding: 14px;
    box-shadow: 0 12px 36px rgba(124,58,237,0.10);
    position: relative;
    overflow: hidden;
  }
  .rtupg-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 90% -20%, rgba(124,58,237,0.18), transparent 60%);
    pointer-events: none;
  }
  .rtupg-card .head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
    position: relative;
  }
  .rtupg-card .ava {
    width: 36px; height: 36px;
    border-radius: 9999px;
    background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    flex-shrink: 0;
  }
  .rtupg-card .who .name { font-size: 13px; font-weight: 700; color: #fff; }
  .rtupg-card .who .role { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 1px; }
  .rtupg-card .live {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: #34d399;
  }
  .rtupg-card .live .dot {
    width: 6px; height: 6px;
    border-radius: 9999px;
    background: #34d399;
    box-shadow: 0 0 8px #34d399;
    animation: livepulse 1.6s ease-out infinite;
  }
  .rtupg-card .now {
    background: rgba(124,58,237,0.10);
    border: 1px solid rgba(124,58,237,0.25);
    border-radius: 10px;
    padding: 8px 10px;
    margin-bottom: 10px;
    font-size: 12px;
    color: rgba(255,255,255,0.85);
  }
  .rtupg-card .now b { color: #c4b5fd; font-weight: 600; }
  .rtupg-card .now .when {
    display: block;
    font-size: 10px;
    color: rgba(255,255,255,0.45);
    margin-top: 2px;
    letter-spacing: 0.06em;
  }
  .rtupg-card .signals {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .rtupg-card .sig {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 6px 8px;
  }
  .rtupg-card .sig .k {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }
  .rtupg-card .sig .v {
    font-size: 12px;
    color: rgba(255,255,255,0.92);
    margin-top: 2px;
  }

  /* recommended actions list */
  .actions {
    align-self: stretch;
    width: 100%;
    background: linear-gradient(180deg, #141414 0%, #0e0e0e 100%);
    border: 1px solid var(--line);
    border-radius: 18px;
    overflow: hidden;
    animation: slideIn 350ms ease;
    display: block;
  }
  .actions-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--line-soft);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .actions-head .title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
  }
  .actions-head .meta {
    font-size: 10px;
    color: rgba(255,255,255,0.40);
    letter-spacing: 0.08em;
  }
  .action-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-top: 1px solid var(--line-soft);
  }
  .action-row .num {
    width: 26px; height: 26px;
    border-radius: 9999px;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.85);
    font-size: 11px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .action-row .body { flex: 1; min-width: 0; }
  .action-row .body .what { font-size: 13px; color: rgba(255,255,255,0.92); }
  .action-row .body .who {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    margin-top: 2px;
  }
  .action-row .runner {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: 9999px;
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase;
    border: 1px solid;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .action-row .runner.gemini {
    color: #93c5fd;
    border-color: rgba(96,165,250,0.35);
    background: rgba(96,165,250,0.08);
  }
  .action-row .runner.agentforce {
    color: #4ec5ee;
    border-color: rgba(0,161,224,0.35);
    background: rgba(0,161,224,0.08);
  }

  /* primary CTA — "yes, do it" */
  .cta-row {
    align-self: flex-end;
    display: flex;
    gap: 8px;
  }
  .cta {
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 18px;
    border-radius: 9999px;
    border: 1px solid;
    transition: transform 150ms ease, box-shadow 150ms ease;
  }
  .cta.primary {
    background: linear-gradient(90deg, #3b82f6 0%, #6366f1 100%);
    color: #fff;
    border-color: rgba(99,102,241,0.6);
    box-shadow: 0 8px 24px rgba(59,130,246,0.25);
  }
  .cta.secondary {
    background: rgba(255,255,255,0.03);
    color: rgba(255,255,255,0.7);
    border-color: var(--line);
  }
  .cta:hover { transform: translateY(-1px); }

  /* ===== Right-hand panel: Agentforce + AXL email preview ===== */
  .axl-panel {
    width: 100%;
    flex: 1 1 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    color: rgba(255,255,255,0.92);
  }
  .axl-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,0.02);
  }
  .axl-head .l { display: flex; align-items: center; gap: 10px; }
  .axl-head .l .title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
  }
  .axl-head .l .sub {
    font-size: 10px;
    color: rgba(255,255,255,0.45);
    margin-top: 2px;
    letter-spacing: 0.06em;

  function mountEntry(e) {
    const scroll = document.getElementById("chatScroll");
    if (!scroll) return;
    const el = document.createElement("div");
    el.id = e.id;
    el.innerHTML = entryHtml(e);
    // unwrap the single child so we keep our class structure flat
    const child = el.firstElementChild;
    if (child) {
      child.id = e.id;
      scroll.appendChild(child);
    } else {
      scroll.appendChild(el);
    }
  }

  function entryHtml(e) {
    if (e.kind === "user") {
      return `<div class="bubble-user">${escapeHtml(e.text)}</div>`;
    }
    if (e.kind === "ai") {
      return `

          <span style="margin-top:2px">${iconGemini(18)}</span>
          <div class="body">${e.html}</div>
        </div>`;
    }
    if (e.kind === "tools") {
      const inner = e.items.map(t => toolHtml(t)).join("");
      return `<div class="tools" data-id="${e.id}">${inner}</div>`;
    }
    if (e.kind === "tile") {

    }
    return "<div></div>";

  function toolHtml(t) {

    const statusLabel = t.status === "done" ? "Done" : "Running";
    return `

  }

  function updateToolStatus(toolsEntry, toolId, newStatus) {
    const item = toolsEntry.items.find(t => t.id === toolId);

    const el = document.querySelector(`[data-tool-id="${toolId}"]`);
    if (el) {

    if (chat && !document.getElementById("axlRight")) {
      chat.appendChild(right);
    }

    appendEntry({
      kind: "ai",
      html: `<p>Action 3 done. Agentforce built a personalized content block — <b>powered by AXL</b> — that will be injected into Maya's next scheduled nurture email. Approve it on the right and I'll move on to action 4 (Devon's webinar invite).</p>`
    });

    setTimeout(() => { animating = false; }, 400);
  }

  // ---------- Step 11: Action 4 — Agentforce orchestrates the webinar invite ----------
  // Agentforce is doing the multi-system work: choosing the webinar variant
  // from Devon's RTUPG signals, registering him in Marketing Cloud, generating
  // a tracked save-my-seat link, logging the SFDC campaign member, and *then*
  // handing the prepared draft to Gmail. The Gmail draft is just the final surface.
  function runStep11() {
    animating = true;

    const right = document.getElementById("axlRight");
    if (!right) { animating = false; return; }

    // ----- Phase 1: Agentforce orchestration loading screen (~2s) -----
    right.innerHTML = `
      <div style="padding:14px 20px;border-bottom:1px solid var(--line);background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
        <div>
          <div style="font-size:12px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.85);">Action 4 · Webinar Invite to Devon</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.45);margin-top:3px;letter-spacing:0.06em;">Agentforce Engagement Agent · orchestrating across Marketing Cloud, SFDC, Gmail</div>
        </div>
        <span class="axl-pill draft" style="background:rgba(124,58,237,0.14);color:#c4b5fd;border-color:rgba(124,58,237,0.35;">Working…</span>
      </div>

      <div id="afOrchestrate" style="flex:1 1 0;min-height:0;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:10px;">
        <div style="font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#c4b5fd;margin-bottom:4px;">Agentforce subtasks</div>
        <div class="af-step" data-i="0"><span class="af-spin"></span><span class="af-text">Selecting webinar variant from Devon's RTUPG signals (streaming-ingest · returning visitor)…</span></div>
        <div class="af-step" data-i="1"><span class="af-spin"></span><span class="af-text">Registering attendee in Marketing Cloud event campaign…</span></div>
        <div class="af-step" data-i="2"><span class="af-spin"></span><span class="af-text">Generating tracked save-my-seat link · UTM bound to Devon's profile…</span></div>
        <div class="af-step" data-i="3"><span class="af-spin"></span><span class="af-text">Logging Campaign Member on Northwind opportunity…</span></div>
        <div class="af-step" data-i="4"><span class="af-spin"></span><span class="af-text">Drafting body copy from AXL content tile · handing to Gmail…</span></div>
      </div>`;

    // simple inline styles for the loading rows (added dynamically so we don't bloat <style>)
    const style = document.createElement("style");
    style.id = "afOrchestrateStyles";
    style.textContent = `
      .af-step {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 14px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px;
        font-size: 13px;
        color: rgba(255,255,255,0.55);
        opacity: 0.4;
        transform: translateY(4px);
        transition: opacity 250ms ease, transform 250ms ease;
      }
      .af-step.in { opacity: 1; transform: none; }
      .af-step.done { color: rgba(255,255,255,0.92); border-color: rgba(34,197,94,0.30); background: rgba(34,197,94,0.06); }
      .af-spin {
        width: 14px; height: 14px;
        border-radius: 9999px;
        border: 2px solid rgba(196,181,253,0.25);
        border-top-color: #c4b5fd;
        animation: afspin 0.9s linear infinite;
        flex-shrink: 0;
      }
      .af-step.done .af-spin {
        border: none;
        background: #22c55e;
        animation: none;
        position: relative;
      }
      .af-step.done .af-spin::after {
        content: "✓";
        position: absolute;
        inset: 0;
        display: flex; align-items: center; justify-content: center;
        color: #052e16;
        font-size: 10px;
        font-weight: 800;
      }
      @keyframes afspin { to { transform: rotate(360deg); } }
    `;
    if (!document.getElementById("afOrchestrateStyles")) document.head.appendChild(style);

    // animate steps in & complete them progressively over ~2s
    const stepEls = right.querySelectorAll(".af-step");
    const reveal = (i) => { if (stepEls[i]) stepEls[i].classList.add("in"); };
    const complete = (i) => { if (stepEls[i]) stepEls[i].classList.add("done"); };
    [0,1,2,3,4].forEach(i => setTimeout(() => reveal(i), i * 120));
    [700, 950, 1200, 1500, 1800].forEach((t, i) => setTimeout(() => complete(i), t));

    // When orchestration finishes, surface a hint that the next click reveals the draft.
    setTimeout(() => {
      const list = document.getElementById("afOrchestrate");
      if (list) {
        const hint = document.createElement("div");
        hint.id = "afReadyHint";
        hint.style.cssText = "margin-top:14px;padding:12px 14px;border:1px solid rgba(34,197,94,0.35);background:rgba(34,197,94,0.08);border-radius:12px;font-size:12px;color:#86efac;letter-spacing:0.06em;display:flex;align-items:center;justify-content:space-between;";
        hint.innerHTML = `<span><b>Orchestration complete</b> — draft handed to Gmail.</span><span style="color:rgba(255,255,255,0.55);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;">Click to open →</span>`;
        list.appendChild(hint);
      }
      step11OrchestrationDone = true;
      animating = false;
    }, 2100);

    appendEntry({
      kind: "ai",
      html: `<p>Action 4 — Agentforce is orchestrating the invite: registering Devon in the Marketing Cloud event, generating a tracked link, logging the SFDC campaign member, and drafting the Gmail body. Once it lands, you can open the draft.</p>`
    });
  }

  // ---------- Step 11b: open the Gmail draft (revealed on next click) ----------
  function runStep11b() {
    animating = true;
    const r = document.getElementById("axlRight");
    if (!r) { animating = false; return; }
    r.innerHTML = `
      <div style="padding:14px 20px;border-bottom:1px solid var(--line);background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
        <div>
          <div style="font-size:12px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.85);">Action 4 · Webinar Invite to Devon</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.45);margin-top:3px;letter-spacing:0.06em;">Agentforce orchestration complete · draft handed to Gmail for final review</div>
        </div>
        <span class="axl-pill draft" style="background:rgba(124,58,237,0.14);color:#c4b5fd;border-color:rgba(124,58,237,0.35);">Ready to Send</span>
      </div>

      <div style="flex:1 1 0;min-height:0;display:flex;flex-direction:column;padding:18px 18px 0;background:#0e0e0e;">
        <div class="gmail-draft">
          <div class="gmail-titlebar">
            <span>New Message</span>
            <div class="actions"><span>—</span><span>⤢</span><span>×</span></div>
          </div>
          <div class="gmail-fields">
            <div class="gmail-field">
              <span class="lbl">To</span>
              <span class="chip"><span class="ava">DP</span>Devon Park &lt;devon.park@northwind.io&gt;</span>
            </div>
            <div class="gmail-field">
              <span class="lbl">From</span>
              <span class="val">Chris Charalambous &lt;chris@yourcompany.com&gt;</span>
            </div>
            <div class="gmail-field">
              <span class="lbl">Subject</span>
              <span class="subject-input">Devon — quick invite to next Thursday's roundtable</span>
            </div>
          </div>
          <div class="gmail-body">
            <p>Hi Devon,</p>
            <p>We're running our <b>Real-Time Data at Scale</b> roundtable again next Thursday — small group, practitioner-led, focused on moving from batch to streaming without rebuilding the warehouse.</p>
            <div class="gmail-event">
              <div class="date">
                <div class="m">Thu</div>
                <div class="d">23</div>
              </div>
              <div class="info">
                <div class="t">Real-Time Data at Scale — practitioner roundtable</div>
                <div class="s">45 min · registered via Marketing Cloud · save-my-seat link tracked</div>
              </div>
            </div>
            <p>You came to the March session — I think the streaming-ingest content this time round will land well for what Northwind is working on.</p>
            <p>Let me know if you can make it; your seat is held.</p>
            <div class="signature">
              Best,<br>
              Chris<br>
              <span style="color:#9aa0a6">Acme · BDR Team</span>
            </div>
          </div>
          <div class="gmail-toolbar">
            <button class="gmail-send" id="gmailSendBtn">Send</button>
            <span style="color:#5f6368;font-size:13px;">Saved · Draft</span>
            <span class="gmail-trash">🗑</span>
          </div>
        </div>
      </div>`;
    setTimeout(() => { animating = false; }, 250);
  }

  // ---------- Step 12: All four actions complete ----------
  function runStep12() {
    animating = true;

    appendEntry({ kind: "user", text: "Send it." });

    // Replace the right panel with a clean "all done" summary.
    const right = document.getElementById("axlRight");
    if (right) {
      right.innerHTML = `
        <div style="padding:14px 20px;border-bottom:1px solid var(--line);background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
          <div>
            <div style="font-size:12px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#86efac;">Engagements Dispatched</div>
            <div style="font-size:10px;color:rgba(255,255,255,0.45);margin-top:3px;letter-spacing:0.06em;">All 4 actions complete · Salesforce updated</div>
          </div>
          <span class="axl-pill" style="background:rgba(34,197,94,0.14);color:#86efac;border-color:rgba(34,197,94,0.35);">Done</span>
        </div>

        <div style="flex:1 1 0;min-height:0;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:14px;">

          <div class="done-card">
            <div class="head">
              <div class="check">✓</div>
              <div>
                <div class="title">Summary</div>
                <div class="sub">4 of 4 plays executed</div>
              </div>
            </div>
            <div class="done-row"><span class="tick">✓</span><span><b>Reply drafted</b> on Devon's pricing thread <span class="meta">Gmail</span></span></div>
            <div class="done-row"><span class="tick">✓</span><span><b>Slack note</b> posted to #ae-acme · @P.Singh notified <span class="meta">Slack</span></span></div>
            <div class="done-row"><span class="tick">✓</span><span><b>AXL content block</b> queued for Maya's next nurture (Thu 9am) <span class="meta">Marketing Cloud</span></span></div>
            <div class="done-row"><span class="tick">✓</span><span><b>Webinar invite sent</b> to Devon Park <span class="meta">Gmail</span></span></div>
          </div>

          <div style="padding:14px 16px;border:1px solid rgba(0,161,224,0.30);border-radius:12px;background:rgba(0,161,224,0.06);font-size:13px;color:rgba(255,255,255,0.9);line-height:1.55;">
            <div style="font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#4ec5ee;margin-bottom:6px;">Salesforce Updated</div>
            2 contacts added to <b>Campaign: Real-Time Data Roundtable Q3</b><br>
            1 dynamic content block bound to <b>Maya Chen's</b> profile · variant B<br>
            Activity logged on Acme Data Co + Northwind Analytics opportunities
          </div>

        </div>`;
    }

    appendEntry({
      kind: "ai",
      html: `<p>All four actions are done. Two customer-facing touches went out, the AXL block is queued for Maya's next nurture, and Salesforce is in sync. Want me to keep watching these accounts?</p>`
    });

    setTimeout(() => { animating = false; }, 400);
  }

  function render() {
    if (stepIndex <= 1) {
      chatMounted = false;
      renderHome();
    } else {
      mountChat();
    }
    renderProgress();
  }

  // ---------- Click-to-advance ----------
  document.addEventListener("click", () => {
    if (typingTimer || animating) return;

    if (stepIndex === 0) {
      const inputEl = document.querySelector(".promptbox .input");
      const sendEl = document.querySelector(".promptbox .send");
      let i = 0;
      typingTimer = setInterval(() => {
        i++;
        typed = PROMPT_TEXT.slice(0, i);
        if (inputEl) {
          inputEl.innerHTML = `<span>${escapeHtml(typed)}</span><span class="caret"></span>`;
        }
        if (i === PROMPT_TEXT.length) {
          clearInterval(typingTimer);
          typingTimer = null;
          if (sendEl) sendEl.classList.add("armed");
          stepIndex = 1;
          renderProgress();
        }
      }, 25);
      return;
    }

    if (stepIndex === 1) {
      stepIndex = 2;
      mountChat();
      renderProgress();
      runStep2();
      return;
    }

    if (stepIndex === 2) {
      stepIndex = 3;
      renderProgress();
      runStep3();
      return;
    }

    if (stepIndex === 3) {
      stepIndex = 4;
      renderProgress();
      runStep4();
      return;
    }

    if (stepIndex === 4) {
      stepIndex = 5;
      renderProgress();
      runStep5();
      return;
    }

    if (stepIndex === 5) {
      stepIndex = 6;
      renderProgress();
      runStep6();
      return;
    }

    if (stepIndex === 6) {
      stepIndex = 7;
      renderProgress();
      runStep7();
      return;
    }

    if (stepIndex === 7) {
      stepIndex = 8;
      renderProgress();
      runStep8();
      return;
    }

    if (stepIndex === 8) {
      stepIndex = 9;
      renderProgress();
      runStep9();
      return;
    }

    if (stepIndex === 9) {
      stepIndex = 10;
      renderProgress();
      runStep10();
      return;
    }

    if (stepIndex === 10) {
      stepIndex = 11;
      step11OrchestrationDone = false;
      renderProgress();
      runStep11();
      return;
    }

    if (stepIndex === 11) {
      // First click after orchestration → reveal the gmail draft.
      // Second click → advance to step 12.
      if (!step11OrchestrationDone) return; // still loading; ignore
      const draftAlreadyShown = !!document.querySelector("#axlRight .gmail-draft");
      if (!draftAlreadyShown) {
        runStep11b();
        return;
      }
      stepIndex = 12;
      renderProgress();
      runStep12();
      return;
    }

    // step 12 → loop back to home
    if (stepIndex >= 12) {
      stepIndex = 0;
      typed = "";
      chatLog = [];
      chatMounted = false;
      a2aTools = null;
      const right = document.getElementById("axlRight");
      if (right) right.remove();
      const left = document.getElementById("chatLeft");
      if (left) left.classList.remove("shrunk");
      render();
    }
  });

  // initial paint
  render();
</script>
